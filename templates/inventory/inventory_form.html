{% extends "base.html" %}

{% block title %}{{ title }} — WMS{% endblock %}

{% block content %}
  <div class="grid grid--center">
    <section class="card card--glass card--lg">
      <div class="card__header">
        <h1 class="h2">{{ title }}</h1>
      </div>

      <form method="post" class="form stack">
        {% csrf_token %}

        {% if form.non_field_errors %}
          <div class="toast toast--danger">
            <div class="toast__title">{{ form.non_field_errors }}</div>
          </div>
        {% endif %}

        {% for field in form %}
          <label class="field">
            <span class="field__label">{{ field.label }}</span>
            {{ field }}
            {% if field.errors %}
              <div class="hint" style="color:rgba(255,80,120,.9);">{{ field.errors }}</div>
            {% endif %}
          </label>
        {% endfor %}

        <div class="row row--between row--wrap">
          <button class="btn btn--primary" type="submit">Создать</button>
          <a class="btn btn--ghost" href="{% url 'inventory_list' %}">Отмена</a>
        </div>
      </form>
    </section>
  </div>
{% endblock %}
