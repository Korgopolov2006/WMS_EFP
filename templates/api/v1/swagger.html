{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
  <div class="row row--between row--wrap" style="margin-bottom:12px;">
    <div>
      <h1 class="h2">Swagger UI</h1>
      <p class="muted">Интерактивная документация API v1.</p>
    </div>
    <div class="row row--wrap">
      <a class="btn btn--ghost" href="{{ spec_url }}" target="_blank" rel="noopener">OpenAPI JSON</a>
      <a class="btn btn--ghost" href="{% url 'api_v1_redoc' %}">ReDoc</a>
    </div>
  </div>
  <div id="swagger-ui" style="min-height:75vh;border:1px solid var(--stroke);border-radius:12px;overflow:hidden;"></div>

  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', function () {
      window.SwaggerUIBundle({
        url: "{{ spec_url }}",
        dom_id: '#swagger-ui',
        deepLinking: true,
        tryItOutEnabled: true,
        persistAuthorization: true
      });
    });
  </script>
{% endblock %}
