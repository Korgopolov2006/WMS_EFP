                                                                                                                                                                                                                                                                                                                                                          {% load static %}
                                                                                                                                                                                                                                                                                                                                                          <!doctype html>
                                                                                                                                                                                                                                                                                                                                                          <html lang="ru">
                                                                                                                                                                                                                                                                                                                                                            <head>
                                                                                                                                                                                                                                                                                                                                                              <meta charset="utf-8" />
                                                                                                                                                                                                                                                                                                                                                              <meta name="viewport" content="width=device-width, initial-scale=1" />
                                                                                                                                                                                                                                                                                                                                                              <title>{% block title %}WMS автозапчастей{% endblock %}</title>
                                                                                                                                                                                                                                                                                                                                                              <link rel="stylesheet" href="{% static 'css/app.css' %}?v=20260219-2" />
                                                                                                                                                                                                                                                                                                                                                             {% block extra_css %}{% endblock %}
                                                                                                                                                                                                                                                                                                                                                              <script defer src="{% static 'js/app.js' %}?v=20260219-2"></script>
                                                                                                                                                                                                                                                                                                                                                            </head>
                                                                                                                                                                                                                                                                                                                                                            <body>
                                                                                                                                                                                                                                                                                                                                                              <div class="bg">
                                                                                                                                                                                                                                                                                                                                                                <div class="bg__blob bg__blob--a"></div>
                                                                                                                                                                                                                                                                                                                                                                <div class="bg__blob bg__blob--b"></div>
                                                                                                                                                                                                                                                                                                                                                                <div class="bg__grid"></div>
                                                                                                                                                                                                                                                                                                                                                              </div>

                                                                                                                                                                                                                                                                                                                                                              {% include "partials/nav.html" %}

                                                                                                                                                                                                                                                                                                                                                              <main class="container">
                                                                                                                                                                                                                                                                                                                                                                {% if messages %}
                                                                                                                                                                                                                                                                                                                                                                  <div class="stack stack--sm">
                                                                                                                                                                                                                                                                                                                                                                    {% for message in messages %}
                                                                                                                                                                                                                                                                                                                                                                      <div class="toast toast--{{ message.tags|default:'info' }}">
                                                                                                                                                                                                                                                                                                                                                                        <div class="toast__title">{{ message }}</div>
                                                                                                                                                                                                                                                                                                                                                                      </div>
                                                                                                                                                                                                                                                                                                                                                                    {% endfor %}
                                                                                                                                                                                                                                                                                                                                                                  </div>
                                                                                                                                                                                                                                                                                                                                                                {% endif %}

                                                                                                                                                                                                                                                                                                                                                                {% block content %}{% endblock %}
                                                                                                                                                                                                                                                                                                                                                              </main>
                                                                                                                                                                                                                                                                                                                                                            </body>
                                                                                                                                                                                                                                                                                                                                                          </html>
