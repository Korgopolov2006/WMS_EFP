[pytest]
DJANGO_SETTINGS_MODULE = wms.settings
python_files = tests/test_*.py test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --tb=short
    --strict-markers
    -q
filterwarnings =
    ignore:datetime\.datetime\.utcnow\(\) is deprecated and scheduled for removal in a future version\..*:DeprecationWarning:openpyxl\.packaging\.core
    ignore:datetime\.datetime\.utcnow\(\) is deprecated and scheduled for removal in a future version\..*:DeprecationWarning:openpyxl\.writer\.excel
markers =
    slow: тесты, требующие много времени
    integration: интеграционные тесты
